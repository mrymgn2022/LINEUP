<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>STARTING XI — 戦術ボード</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap');
@import url('https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css');
.fi{vertical-align:-0.12em;border-radius:2px;box-shadow:0 0 0 .5px rgba(0,0,0,.35);margin-right:2px}
.renameTrigger{cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.penIcon{font-size:.62em;color:var(--lime);background:rgba(202,255,58,.14);border:1px solid rgba(202,255,58,.4);border-radius:6px;padding:3px 5px;line-height:1;flex:0 0 auto}
.renameTrigger:active .penIcon{background:var(--lime);color:#0a0e0c}

:root{
  --bg:#0a0e0c;
  --panel:#111714;
  --panel2:#171f1b;
  --line:#243029;
  --grass-a:#15493a;
  --grass-b:#12402f;
  --lime:#caff3a;
  --lime-dim:#9ec92a;
  --ink:#eafff0;
  --mut:#7d9389;
  --red:#ff5b6e;
  --gold:#ffd166;
  --shadow:0 10px 30px rgba(0,0,0,.45);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  background:
    radial-gradient(120% 80% at 50% -10%, #16221c 0%, var(--bg) 55%) fixed;
  color:var(--ink);
  font-family:'Manrope',system-ui,sans-serif;
  overflow:hidden;
  user-select:none;-webkit-user-select:none;
}
.app{display:flex;flex-direction:column;height:100dvh;max-width:560px;margin:0 auto;position:relative;overflow:hidden}
.scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;touch-action:pan-y}

/* ---------- Header ---------- */
header{
  padding:calc(env(safe-area-inset-top) + 10px) 14px 8px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.brand{min-width:0;flex-shrink:1}
.logo{font-family:'Bebas Neue';font-size:25px;letter-spacing:1.5px;line-height:.9;color:var(--ink);white-space:nowrap}
.logo b{color:var(--lime)}
.tag{font-size:9px;letter-spacing:3px;color:var(--mut);text-transform:uppercase;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.tag.team{
  letter-spacing:.3px;text-transform:none;font-size:11px;font-weight:800;color:#0a0e0c;
  background:var(--lime);display:inline-flex;align-items:center;gap:4px;
  padding:2px 9px;border-radius:999px;
}
.tag.team::before{content:'●';font-size:7px}
.hbtn{margin-left:auto;display:flex;gap:6px;flex-shrink:0}
.icon{
  width:36px;height:36px;border-radius:11px;border:1px solid var(--line);
  background:var(--panel);color:var(--ink);font-size:15px;display:grid;place-items:center;
  cursor:pointer;transition:.15s;
}
.icon:active{transform:scale(.92);background:var(--panel2)}
.icon.postog{font-size:11px;font-weight:800;letter-spacing:.5px;font-family:'Bebas Neue',sans-serif}
.icon.subtog{font-size:12px;font-weight:800;letter-spacing:.2px}
.icon svg{width:19px;height:19px;display:block}

/* ---------- Formation bar ---------- */
.fbar{display:flex;gap:7px;overflow-x:auto;padding:4px 14px 10px;flex-shrink:0;scrollbar-width:none}
.fbar::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;padding:8px 13px;border-radius:999px;border:1px solid var(--line);
  background:var(--panel);font-family:'Bebas Neue';font-size:16px;letter-spacing:1.5px;
  color:var(--mut);cursor:pointer;transition:.15s;white-space:nowrap;
}
.chip.on{background:var(--lime);color:#0a0e0c;border-color:var(--lime);box-shadow:0 4px 14px rgba(202,255,58,.25)}
.chip:active{transform:scale(.95)}

/* ---------- Pitch ---------- */
.pitchwrap{padding:8px 12px 8px;position:relative}
.pitch{
  position:relative;width:100%;height:clamp(560px,72vh,610px);border-radius:18px;overflow:hidden;
  background:
    repeating-linear-gradient(0deg, var(--grass-a) 0 9.09%, var(--grass-b) 9.09% 18.18%);
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.10), var(--shadow);
}
.pitch .markings{position:absolute;inset:0;pointer-events:none}
.mk{position:absolute;border:2px solid rgba(255,255,255,.16)}
.mk.center-line{left:5%;right:5%;top:50%;height:0;border-width:2px 0 0 0}
.mk.center-circle{left:50%;top:50%;width:34%;padding-bottom:34%;height:0;border-radius:50%;transform:translate(-50%,-50%)}
.mk.spot{width:5px;height:5px;background:rgba(255,255,255,.4);border:0;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%)}
.mk.box-top{left:24%;right:24%;top:0;height:14%;border-top:0}
.mk.box-top-s{left:36%;right:36%;top:0;height:6%;border-top:0}
.mk.box-bot{left:24%;right:24%;bottom:0;height:14%;border-bottom:0}
.mk.box-bot-s{left:36%;right:36%;bottom:0;height:6%;border-bottom:0}

/* ---------- Player token ---------- */
.tok{
  position:absolute;width:80px;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;cursor:grab;touch-action:pan-y;z-index:2;
}
.tok.drag{z-index:30;cursor:grabbing}
.disc{
  width:50px;height:50px;border-radius:50%;display:grid;place-items:center;position:relative;
  background:linear-gradient(160deg,#1d2722,#10160f);
  border:2px solid var(--lime);box-shadow:0 5px 14px rgba(0,0,0,.5);
  font-weight:800;font-size:15px;color:var(--ink);
}
.tok.drag .disc{transform:scale(1.12);border-color:#fff}
.disc.empty{border-style:dashed;border-color:var(--mut);background:rgba(255,255,255,.03);color:var(--mut);font-weight:600;font-size:20px}
.disc svg{width:26px;height:26px;opacity:.9}
.disc.photo{background-size:cover;background-position:center 20%}
.disc.photo svg{display:none}
.disc .val{position:absolute;bottom:-6px;right:-6px;background:var(--lime);color:#0a0e0c;font-size:8px;font-weight:800;padding:1px 4px;border-radius:6px;border:1px solid #0a0e0c}
.role{margin-top:12px;font-family:'Bebas Neue';font-size:12px;letter-spacing:1px;color:var(--lime-dim);line-height:1}
.pname{margin-top:2px;font-size:13px;font-weight:700;max-width:96px;text-align:center;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;text-shadow:0 1px 3px #000}
.psub{margin-top:1px;font-size:10px;font-weight:700;max-width:96px;text-align:center;color:#ffc46b;opacity:.92;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;text-shadow:0 1px 3px #000}
.psub::before{content:'▸';font-size:7px;margin-right:2px;opacity:.7}
/* ポジション名を隠した時：選手名を大きく表示 */
.pitch.bigname .pname{margin-top:10px;font-size:16px;max-width:112px}
.pitch.bigname .psub{font-size:12px;max-width:112px}
.icon.on{background:var(--lime);color:#0a0e0c;border-color:var(--lime)}
.pname .fi{margin-right:3px;vertical-align:-1px;border-radius:2px;box-shadow:0 0 0 .5px rgba(0,0,0,.35)}
.satabs{display:flex;gap:7px;margin:2px 0 12px}
.satab{flex:1;padding:10px 8px;border-radius:11px;border:1px solid var(--line);background:var(--panel);color:var(--mut);font-size:13px;font-weight:800;cursor:pointer;transition:.12s}
.satab.on{background:var(--lime);color:#0a0e0c;border-color:var(--lime)}
.satab:active{transform:scale(.98)}
.sharebtns{display:flex;gap:9px;margin:4px 0 10px}
.snsbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:12px 8px;border-radius:12px;border:none;font-size:14px;font-weight:800;color:#fff;cursor:pointer}
.snsbtn svg{width:18px;height:18px;flex-shrink:0}
.snsbtn.x{background:#000}
.snsbtn.ig{background:linear-gradient(45deg,#f09433,#e6683c 30%,#dc2743 55%,#cc2366 75%,#bc1888)}
.snsbtn:active{transform:scale(.97)}
.flag{font-size:9px}
.disc .capt{position:absolute;top:-6px;left:-6px;width:15px;height:15px;border-radius:50%;background:var(--gold);color:#0a0e0c;font-size:9px;font-weight:800;display:grid;place-items:center;border:1.5px solid #0a0e0c}

/* ---------- Club emblem ---------- */
.emblem{
  flex:0 0 auto;width:22px;height:22px;border-radius:50%;
  display:inline-grid;place-items:center;
  font-family:'Bebas Neue';font-size:9px;letter-spacing:.3px;color:#fff;
  box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.25);
}
.prow .nm .emblem{vertical-align:middle;margin-right:6px}

/* ---------- Bottom info ---------- */
.statbar{
  flex-shrink:0;display:flex;gap:8px;justify-content:center;align-items:center;
  margin:6px 14px calc(env(safe-area-inset-bottom) + 12px);
  padding:13px 14px;border:1px solid var(--line);border-radius:13px;background:var(--panel);
  cursor:pointer;font-weight:800;font-size:15px;color:var(--ink);
}
.statbar:active{opacity:.85;transform:scale(.99)}
.statbar .saicon{font-size:17px}
.stat{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:8px 10px}
.stat .k{font-size:9px;letter-spacing:2px;color:var(--mut);text-transform:uppercase}
.stat .v{font-family:'Bebas Neue';font-size:22px;letter-spacing:1px;color:var(--lime);line-height:1}
.stat .v small{font-size:12px;color:var(--mut);font-family:'Manrope';font-weight:600}

/* ---------- Bench ---------- */
.bench{padding:2px 14px calc(env(safe-area-inset-bottom) + 30px)}
.bench .bh{display:flex;align-items:baseline;gap:9px;margin:8px 2px 11px}
.bench .bh b{font-family:'Bebas Neue';font-size:21px;letter-spacing:1.5px;color:var(--ink)}
.bench .bh span{font-size:11px;color:var(--mut)}
.bench .bh i{margin-left:auto;font-style:normal;font-size:10px;color:var(--lime-dim);letter-spacing:1px}
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:9px}
.bcard{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:11px 7px 9px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:.12s}
.bcard:active{transform:scale(.95);background:var(--panel2)}
.bav{width:46px;height:46px;border-radius:50%;background:linear-gradient(160deg,#1d2722,#10160f);border:2px solid var(--line);display:grid;place-items:center;color:var(--mut);overflow:hidden}
.bav svg{width:22px;height:22px;opacity:.85}
.bav.photo{background-size:cover;background-position:center 20%;border-color:var(--lime)}
.bav.photo svg{display:none}
.bcard .bn{font-size:11px;font-weight:800;text-align:center;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
.bcard .bp{font-family:'Bebas Neue';font-size:12px;letter-spacing:.5px;color:var(--lime-dim);line-height:.9}
.bcard .bv{font-size:10px;color:var(--mut);font-weight:700;line-height:1;display:flex;align-items:center;justify-content:center;min-height:15px}
.bcard .bv .fi{font-size:15px;border-radius:2px;box-shadow:0 0 0 .5px rgba(0,0,0,.35)}
.bcard[data-pid]{touch-action:none}
.bcard.dragging{opacity:.35}
.bcard.add{justify-content:center;border-style:dashed;border-color:var(--line);background:transparent;min-height:96px}
.bcard.add:active{background:rgba(255,255,255,.03)}
.bcard.add .addplus{font-size:28px;font-weight:800;line-height:1;color:var(--lime)}
.bcard.add .addlbl{font-size:10px;color:var(--mut);font-weight:700}
.benchghost{position:fixed;left:0;top:0;transform:translate(-50%,-50%);z-index:200;pointer-events:none;filter:drop-shadow(0 6px 14px rgba(0,0,0,.5))}
.tok.droptarget .disc{box-shadow:0 0 0 4px var(--lime),0 5px 14px rgba(0,0,0,.5)!important;border-color:#fff!important}
.benchfoot{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px;color:var(--mut);font-size:12px;padding:12px 4px 6px}
.benchfoot b{color:var(--ink);font-family:'Bebas Neue';font-size:19px;letter-spacing:.5px;margin:0 1px}
.benchfoot small{font-size:10px;margin-left:1px}
.benchfoot span{font-size:11px;opacity:.85}
.benchEmpty{color:var(--mut);font-size:12px;padding:6px 4px 24px;line-height:1.8}
.scrollcue{text-align:center;color:var(--mut);font-size:10px;letter-spacing:2px;padding:2px 0 6px;opacity:.8}

/* ---------- Sheet / Modal ---------- */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);z-index:50;opacity:0;pointer-events:none;transition:.2s}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;max-width:560px;margin:0 auto;z-index:60;
  background:var(--panel);border-radius:22px 22px 0 0;border-top:1px solid var(--line);
  transform:translateY(110%);transition:transform .28s cubic-bezier(.3,.9,.3,1);
  max-height:86dvh;display:flex;flex-direction:column;box-shadow:0 -16px 40px rgba(0,0,0,.5);
}
.sheet.on{transform:translateY(0)}
.sheet.expanded{max-height:96dvh}
#sheetBody{display:flex;flex-direction:column;min-height:0;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#sheetBody>h2,#sheetBody>.controls{flex:0 0 auto}
.grabzone{flex:0 0 auto;display:flex;justify-content:center;align-items:center;height:30px;cursor:grab;touch-action:none}
.grabzone:active{cursor:grabbing}
.grab{width:44px;height:5px;border-radius:3px;background:var(--line);transition:width .15s,background .15s}
.grabzone:active .grab,.sheet.expanded .grab{width:64px;background:var(--mut)}
.sheet h2{font-family:'Bebas Neue';font-size:24px;letter-spacing:1.5px;margin:4px 16px 8px;display:flex;align-items:center;gap:8px}
.sheet h2 span{font-size:11px;font-family:'Manrope';font-weight:700;color:var(--lime);background:rgba(202,255,58,.12);padding:3px 9px;border-radius:999px;margin-left:auto}

/* search + filters */
.controls{padding:0 16px 8px}
.search{
  width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:12px;
  padding:11px 13px;color:var(--ink);font-size:15px;font-family:'Manrope';outline:none;
}
.search::placeholder{color:var(--mut)}
.filters{display:flex;gap:6px;overflow-x:auto;padding:9px 0 2px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fchip{flex:0 0 auto;padding:6px 11px;border-radius:999px;border:1px solid var(--line);background:var(--panel2);color:var(--mut);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.fchip.on{background:var(--ink);color:#0a0e0c;border-color:var(--ink)}
.fchip.subchip.on{background:var(--lime);color:#0a0e0c;border-color:var(--lime)}
.filters .fchipdiv{flex:0 0 auto;width:1px;align-self:center;height:18px;background:var(--line);margin:0 5px}

/* list */
.list{overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;overscroll-behavior:contain;padding:4px 12px calc(env(safe-area-inset-bottom) + 18px);flex:1;min-height:0}
.prow{
  display:flex;align-items:center;gap:11px;padding:9px 8px;border-radius:13px;cursor:pointer;transition:.12s;
}
.prow:active{background:var(--panel2)}
.prow .pos{flex:0 0 40px;text-align:center;font-family:'Bebas Neue';font-size:14px;letter-spacing:.5px;color:#0a0e0c;background:var(--lime);border-radius:8px;padding:5px 0}
.prow .pos.gk{background:var(--gold)}
.prow .pos.df{background:#4fc3f7}
.prow .pos.mf{background:#caff3a}
.prow .pos.fw{background:#ff8a65}
.prow .meta{flex:1;min-width:0}
.prow .nm{font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prow .sub{font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prow .price{font-family:'Bebas Neue';font-size:17px;color:var(--lime);letter-spacing:.5px}
.prow.inxi{opacity:.4}
.prow .badge{font-size:9px;color:var(--gold);font-weight:800}
.empty-msg{text-align:center;color:var(--mut);padding:40px 20px;font-size:13px}

/* action menu */
.menu{padding:6px 14px calc(env(safe-area-inset-bottom) + 16px)}
.mitem{display:flex;align-items:center;gap:12px;padding:15px 14px;border-radius:13px;font-weight:700;font-size:15px;cursor:pointer}
.mitem:active{background:var(--panel2)}
.mitem .mi{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--panel2);font-size:15px}
.mitem.danger{color:var(--red)}
.mitem.danger .mi{color:var(--red)}

/* detail */
.detail{padding:0 18px calc(env(safe-area-inset-bottom) + 20px)}
.dhead{display:flex;align-items:center;gap:14px;padding:6px 0 14px}
.davatar{width:62px;height:62px;border-radius:50%;background:linear-gradient(160deg,#1d2722,#10160f);border:2px solid var(--lime);display:grid;place-items:center;font-family:'Bebas Neue';font-size:24px;color:var(--lime);overflow:hidden}
.davatar.photo{background-size:cover;background-position:center 20%}
.davatar.photo svg{display:none}
.davatar svg{width:30px;height:30px}
.dname{font-family:'Bebas Neue';font-size:30px;letter-spacing:1px;line-height:.95}
.dclub{font-size:13px;color:var(--mut);font-weight:600;margin-top:3px}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:4px}
.dcell{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:11px 13px}
.dcell .dk{font-size:10px;letter-spacing:2px;color:var(--mut);text-transform:uppercase}
.dcell .dv{font-family:'Bebas Neue';font-size:23px;letter-spacing:1px;margin-top:2px}
.dcell.full{grid-column:1/3}
.dcell .dv.lime{color:var(--lime)}
.bigbtn{
  width:100%;margin-top:14px;padding:15px;border-radius:14px;border:0;cursor:pointer;
  font-family:'Bebas Neue';font-size:20px;letter-spacing:1.5px;background:var(--lime);color:#0a0e0c;
}
.bigbtn:active{transform:scale(.98)}
.bigbtn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}

.toast{
  position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#0a0e0c;padding:11px 18px;border-radius:999px;font-weight:800;font-size:13px;
  z-index:90;opacity:0;transition:.25s;pointer-events:none;box-shadow:var(--shadow);max-width:90%;text-align:center;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.hint{position:absolute;left:50%;top:46%;transform:translateX(-50%);text-align:center;color:rgba(255,255,255,.5);font-size:12px;pointer-events:none;width:80%}

/* ---------- Load more sentinel ---------- */
.loadmore{
  text-align:center;color:var(--mut);font-size:10px;letter-spacing:1.5px;
  padding:14px 8px 6px;opacity:.8;
}

/* ---------- Bench mode switcher ---------- */
.bench-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;color:var(--mut);font-weight:700;
  padding:2px 0;margin-bottom:4px;
}
.bench-badge b{color:var(--lime)}

/* ---------- Share preview ---------- */
.shareprev{border-radius:14px;overflow:hidden;border:1px solid var(--line);margin-bottom:10px;background:#000}
.shareprev img{display:block;width:100%;height:auto}
.sharecap{font-size:13px;color:var(--ink);line-height:1.5;margin:2px 2px 8px}
.sharelink{margin:0 2px 12px;overflow:hidden;white-space:nowrap}
.sharelink .sl{
  color:#4ea1ff;font-size:14px;font-weight:600;
  text-overflow:clip;          /* 見切れさせる（…を出さない） */
  display:inline-block;max-width:62%;overflow:hidden;white-space:nowrap;vertical-align:bottom;
}

/* ---------- Original team profile form ---------- */
.formfield{margin-bottom:11px}
.formfield label{display:block;font-size:11px;letter-spacing:1px;color:var(--mut);text-transform:uppercase;margin:0 2px 5px}
.formfield label i{font-style:normal;color:var(--lime-dim);margin-left:6px;letter-spacing:0;text-transform:none}
.colorrow{display:flex;gap:9px;flex-wrap:wrap;padding:2px}
.cdot2{width:30px;height:30px;border-radius:50%;cursor:pointer;box-shadow:inset 0 0 0 2px rgba(0,0,0,.25);transition:.12s}
.cdot2.on{box-shadow:0 0 0 3px var(--ink),inset 0 0 0 2px rgba(0,0,0,.25);transform:scale(1.08)}

/* ---------- Original team button ---------- */
.origbtn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:13px;border-radius:13px;margin-bottom:4px;cursor:pointer;
  font-weight:800;font-size:14px;color:#0a0e0c;
  background:linear-gradient(120deg,var(--lime),var(--lime-dim));
  box-shadow:0 4px 14px rgba(202,255,58,.22);
}
.origbtn:active{transform:scale(.98)}

</style>

<div class="app">
  <header>
    <div class="brand">
      <div class="logo">STARTING <b>XI</b></div>
      <div class="tag" id="teamTag">tactics board</div>
    </div>

/* ピッチ座標(x:0-100左→右, y:0自陣→100敵陣)からポジション名を推定 */
function roleFromXY(x,y){
  if(y<15) return 'GK';
  if(y<37){ // ディフェンスライン
    if(x>=72) return 'RB';
    if(x<=28) return 'LB';
    return 'CB';
  }
  if(y<46){ // アンカー〜守備的MF
    if(x>=80) return 'RWB';
    if(x<=20) return 'LWB';
    return 'CDM';
  }
  if(y<62){ // 中盤
    if(x>=80) return 'RM';
    if(x<=20) return 'LM';
    return 'CM';
  }
  if(y<72){ // トップ下
    if(x>=78) return 'RM';
    if(x<=22) return 'LM';
    return 'CAM';
  }
  // 前線
  if(x>=68) return 'RW';
  if(x<=32) return 'LW';
  return 'ST';
}

function buildSlots(formKey,keepPlayers){
  const f=FORM[formKey];
  const old=state.slots;
  state.slots=f.map((s,i)=>({role:s[0],x:s[1],y:s[2],
    pid:(keepPlayers&&old[i])?old[i].pid:null,

// 保存用の安定ID：選手名＋国籍コード。配列番号(index)が変わっても選手を特定できる。
function pidToKey(pid){ if(pid==null) return null; const p=P[pid]; if(!p) return null; return p[0].trim()+'|'+(p[3].trim().split(' ').pop()||''); }
// 表示名：ユーザーが設定した愛称があればそれ、なければ元の名前（short=苗字のみ）
function nameOf(pid,short){ if(pid==null||!P[pid])return ''; const c=state.names&&state.names[pidToKey(pid)]; if(c)return c; return short?shortName(P[pid][0]):P[pid][0].trim(); }
let _keyMap=null;
function buildKeyMap(){ _keyMap={}; for(let i=0;i<P.length;i++){ const k=pidToKey(i); if(k!=null&&!(k in _keyMap)) _keyMap[k]=i; } }
function keyToPid(key){
  if(key==null) return null;
  if(typeof key==='number') return (key>=0&&key<P.length)?key:null; // 旧形式(index)の後方互換
  if(!_keyMap) buildKeyMap();
  return (key in _keyMap)?_keyMap[key]:null;
}
async function save(){
  const data={ v:3, formation:state.formation,
    slots:state.slots.map(s=>({role:s.role,x:s.x,y:s.y,pid:pidToKey(s.pid),sub:pidToKey(s.sub)})),
    bench:state.bench.map(pidToKey).filter(k=>k!=null),
    captain:pidToKey(state.captain),
    names:state.names,hideRoles:state.hideRoles,showFlags:state.showFlags,showSubs:state.showSubs,loadedClub:state.loadedClub,teamName:state.teamName,teamInfo:state.teamInfo };
  try{ if(window.storage){ await window.storage.set('xi_state_v2',JSON.stringify(data),false); } }catch(e){}
  memFallback=data;
}
async function savePhotos(){
  const keyed={}; for(const pid in state.photos){ const k=pidToKey(+pid); if(k!=null) keyed[k]=state.photos[pid]; }
  try{ if(window.storage){ await window.storage.set('xi_photos_v2',JSON.stringify({v:3,photos:keyed}),false); } }catch(e){}
  memPhotos=state.photos;
}
async function load(){
  let raw=null;
  try{ if(window.storage){ const r=await window.storage.get('xi_state_v2',false); if(r&&r.value) raw=JSON.parse(r.value); } }catch(e){}
  if(!raw) raw=memFallback;
  if(!raw) return null;
  if(raw.v>=3){ // キー形式 → 現在のindexへ解決（データ更新で番号がズレても正しい選手に復元）
    _keyMap=null; buildKeyMap();
    raw=Object.assign({},raw,{
      slots:(raw.slots||[]).map(s=>({role:s.role,x:s.x,y:s.y,pid:keyToPid(s.pid),sub:keyToPid(s.sub)})),
      bench:(raw.bench||[]).map(keyToPid).filter(v=>v!=null),
      captain:keyToPid(raw.captain) });
  }
  return raw;
}
async function loadPhotos(){
  let raw=null;
  try{ if(window.storage){ const r=await window.storage.get('xi_photos_v2',false); if(r&&r.value) raw=JSON.parse(r.value); } }catch(e){}
  if(!raw) return memPhotos;
  if(raw.v>=3&&raw.photos){ if(!_keyMap) buildKeyMap(); const out={}; for(const k in raw.photos){ const i=keyToPid(k); if(i!=null) out[i]=raw.photos[k]; } return out; }
  return raw; // 旧形式(index-keyed)
}

/* チーム読込時に各スタメン枠の第二候補(slot.sub)を控えから自動で1回だけ割り当てる。
   以後はユーザーが手動で選び、選手交代や移動では自動で変わらない。 */
function autoAssignSubs(){
  if(!state.bench||!state.bench.length)return;
  const used=new Set();
  const savedRole=pickRole;
  state.slots.forEach(s=>{
    if(s.pid==null){s.sub=null;return;}
    pickRole=s.role;
    // 控えのうち未使用の選手を、その枠のサジェスト順（適性ポジション優先）で1人
    const avail=state.bench.filter(pid=>!inXI(pid)&&!used.has(pid)).sort(suggestSort);
    const pid=avail[0];
    // 同じ大枠の控えがいる場合のみ第二候補に（大枠外まで無理に割り当てない）
    if(pid!=null&&grp(P[pid][1])===grp(s.role)){ used.add(pid); s.sub=pid; } else s.sub=null;
  });
  pickRole=savedRole;
}
// スタメンから外れた選手を控えに戻す（クラブ読込時のみ。第二候補に再選択できるように）
function benchReturn(pid){
  if(pid==null||!state.loadedClub) return;
  if(inXI(pid)) return;
  if(!state.bench.includes(pid)) state.bench.push(pid);
}

/* ---- ベンチ → ピッチ ドラッグ交代 ---- */
let dropTarget=-1;
function highlightSlot(si){
  if(si===dropTarget)return;
  if(dropTarget>=0&&tokenEls[dropTarget])tokenEls[dropTarget].classList.remove('droptarget');
  dropTarget=si;
  if(si>=0&&tokenEls[si])tokenEls[si].classList.add('droptarget');
}
function slotAtPoint(x,y){
  const r=pitch.getBoundingClientRect();
  if(x<r.left-40||x>r.right+40||y<r.top-40||y>r.bottom+40)return -1;
  let best=64,bi=-1;
  state.slots.forEach((s,i)=>{
    const cx=r.left+s.x/100*r.width, cy=r.top+(100-s.y)/100*r.height;
    const d=Math.hypot(x-cx,y-cy); if(d<best){best=d;bi=i;}
  });
  return bi;
}
function makeBenchGhost(pid){
  const ph=state.photos[pid];
  const g=document.createElement('div'); g.className='benchghost';
  g.innerHTML=`<div class="disc${ph?' photo':''}" ${ph?`style="background-image:url('${ph}')"`:''}>${SIL}</div>`;
  return g;
}
function attachBenchDrag(el,pid){
  el.style.touchAction='none';
  let sx,sy,dragging=false,ghost=null,lastX=0,lastY=0,scrollRAF=0;
  const scroller=document.getElementById('scroll');
  function paint(){
    if(!ghost)return;
    ghost.style.left=lastX+'px'; ghost.style.top=lastY+'px';
    highlightSlot(slotAtPoint(lastX,lastY));
  }
  // 画面端に近づいたら自動スクロール（縦長でも前線スロットまでドラッグできる）
  function autoScrollTick(){
    if(!dragging){scrollRAF=0;return;}
    const vh=window.innerHeight, edge=120, max=18;
    let dy=0;
    if(lastY<edge) dy=-max*(1-lastY/edge);
    else if(lastY>vh-edge) dy=max*(1-(vh-lastY)/edge);
    if(dy){ const before=scroller.scrollTop; scroller.scrollTop+=dy; if(scroller.scrollTop!==before) paint(); }
    scrollRAF=requestAnimationFrame(autoScrollTick);
  }
  el.addEventListener('pointerdown',e=>{
    e.preventDefault(); sx=e.clientX; sy=e.clientY; dragging=false; ghost=null;
    try{el.setPointerCapture(e.pointerId);}catch(_){}
  });
  el.addEventListener('pointermove',e=>{
    if(sx===undefined)return;
    if(!dragging){
      if(Math.abs(e.clientX-sx)<6&&Math.abs(e.clientY-sy)<6)return;
      dragging=true; el.classList.add('dragging');
      ghost=makeBenchGhost(pid); document.body.appendChild(ghost);
      if(!scrollRAF) scrollRAF=requestAnimationFrame(autoScrollTick);
    }
    lastX=e.clientX; lastY=e.clientY; paint();
  });
  const end=e=>{
    if(sx===undefined)return;
    const was=dragging;
    sx=undefined; dragging=false; el.classList.remove('dragging');
    if(scrollRAF){cancelAnimationFrame(scrollRAF);scrollRAF=0;}
    if(ghost){ghost.remove();ghost=null;} highlightSlot(-1);
    try{el.releasePointerCapture(e.pointerId);}catch(_){}
    if(e.type==='pointercancel') return;          // キャンセルは無視
    if(!was){ openDetail(pid,null); return; }      // 動かなければタップ＝詳細
    const si=slotAtPoint(e.clientX,e.clientY);
    if(si>=0) benchToSlot(pid,si);
  };
  el.addEventListener('pointerup',end);
  el.addEventListener('pointercancel',end);
}
function benchToSlot(pid,slotIdx){
  const outgoing=state.slots[slotIdx].pid;
  state.slots.forEach(s=>{if(s.pid===pid)s.pid=null});
  state.slots[slotIdx].pid=pid;
  if(state.slots[slotIdx].sub===pid) state.slots[slotIdx].sub=null; // 同枠のスタメン＝第2候補の重複を解消
  state.bench=state.bench.filter(b=>b!==pid);
  if(outgoing!=null&&outgoing!==pid&&!state.bench.includes(outgoing)) state.bench.push(outgoing);
  render();save();
  toast(outgoing!=null?shortName(P[pid][0])+' ⇄ '+shortName(P[outgoing][0]):shortName(P[pid][0])+' を起用');
}
function initials(name){const c=name.trim().replace(/\s+$/,'').split(' ');return (c[0][0]+(c.length>1?c[c.length-1][0]:'')).toUpperCase()}
function shortName(name){const t=name.trim();const c=t.split(' ');return c.length>1?c[c.length-1]:t}

});

/* =========================================================
   Drag & tap on tokens
   ========================================================= */
function attachDrag(el,actor){
  let sx,sy,ox,oy,moved,armed,timer,pid,rect;
  const base=()=>state.slots[actor];
  function arm(){
    armed=true; const b=base(); ox=b.x; oy=b.y;
    try{el.setPointerCapture(pid);}catch(_){}
    el.classList.add('drag');
    if(navigator.vibrate){try{navigator.vibrate(15);}catch(_){}}
  }
  function disarm(){ if(timer){clearTimeout(timer);timer=null;} }
  el.addEventListener('pointerdown',e=>{
    sx=e.clientX;sy=e.clientY;moved=false;armed=false;pid=e.pointerId;
    rect=pitch.getBoundingClientRect();
    if(e.pointerType==='mouse'){ e.preventDefault(); arm(); }   // マウスは即ドラッグ
    else { timer=setTimeout(()=>{ if(sx!==undefined&&!moved) arm(); },500); } // タッチは0.5秒長押し
  });
  el.addEventListener('pointermove',e=>{
    if(sx===undefined)return;
    if(!armed){
      if(Math.abs(e.clientX-sx)>6||Math.abs(e.clientY-sy)>6){ moved=true; disarm(); } // 長押し前に動いた＝スクロール
      return;
    }
    e.preventDefault(); moved=true;
    const nx=clamp(ox+(e.clientX-sx)/rect.width*100,3,97);
    const ny=clamp(oy-(e.clientY-sy)/rect.height*100,3,97);
    base().x=nx;base().y=ny;el.style.left=nx+'%';el.style.top=(100-ny)+'%';
  });
  el.addEventListener('pointerup',e=>{
    disarm();
    if(sx===undefined)return;
    const wasArmed=armed, wasMoved=moved; sx=undefined; armed=false;
    el.classList.remove('drag');
    try{el.releasePointerCapture(pid);}catch(_){}
    if(!wasMoved){ onSlotTap(actor); return; }   // タップ（長押しのみ含む）→ メニュー
    if(!wasArmed) return;                         // 長押し前に動いた＝スクロール、何もしない
    let tj=-1,best=46;
    for(let j=0;j<state.slots.length;j++){
      if(j===actor)continue;
      const cx=rect.left+state.slots[j].x/100*rect.width;
      const cy=rect.top+(100-state.slots[j].y)/100*rect.height;
      const d=Math.hypot(e.clientX-cx,e.clientY-cy);
      if(d<best){best=d;tj=j;}
    }
    if(tj>=0){
      const t=state.slots[actor].pid;state.slots[actor].pid=state.slots[tj].pid;state.slots[tj].pid=t;
      state.slots[actor].x=ox;state.slots[actor].y=oy;
      render();save();toast('ポジションを入れ替えました');
    }else{
      const s=state.slots[actor];const nr=roleFromXY(s.x,s.y);
      if(nr!==s.role){ s.role=nr; render(); toast('ポジションを '+nr+' に変更'); }
      save();
    }
  });
  el.addEventListener('pointercancel',()=>{ disarm(); el.classList.remove('drag'); sx=undefined; armed=false; });
}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}

photoInput.addEventListener('change',()=>{
  const f=photoInput.files&&photoInput.files[0]; if(!f||photoTarget==null)return;
  const fr=new FileReader();
  fr.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      // 正方形にトリミングしつつ240pxへ縮小（容量節約）
      const S=240,c=document.createElement('canvas');c.width=S;c.height=S;
      const ctx=c.getContext('2d');
      const side=Math.min(img.width,img.height);
      const sx=(img.width-side)/2, sy=(img.height-side)/2;
      ctx.drawImage(img,sx,sy,side,side,0,0,S,S);
      const url=c.toDataURL('image/jpeg',0.82);
      state.photos[photoTarget]=url;
      const pid=photoTarget;photoTarget=null;
      savePhotos();closeSheet();render();toast('写真を設定しました');
    };
    img.onerror=()=>{photoTarget=null;toast('画像を読み込めませんでした');};
    img.src=fr.result;
  };
  fr.readAsDataURL(f);
});

/* シートのスワイプ操作：上で拡大／下で閉じる（グラブハンドル） */
(function setupSheetDrag(){
  const zone=document.getElementById('grabzone'); if(!zone)return;
  let startY=null,dy=0,dragging=false;
  zone.addEventListener('pointerdown',e=>{
    dragging=true;startY=e.clientY;dy=0;
    sheet.style.transition='none';
    try{ zone.setPointerCapture(e.pointerId); }catch(_){}
  });
  zone.addEventListener('pointermove',e=>{
    if(!dragging)return;
    dy=e.clientY-startY;
    if(dy>0){ // 下方向：指に追従
      sheet.style.transform='translateY('+dy+'px)';
    }else{ // 上方向：拡大
      sheet.classList.add('expanded');
      sheet.style.transform='translateY(0)';
    }
  });
  const end=()=>{
    if(!dragging)return; dragging=false;
    sheet.style.transition='';
    sheet.style.transform='';
    if(dy>110){ closeSheet(); }                                  // 大きく下げたら閉じる
    else if(dy>30){ sheet.classList.remove('expanded'); }        // 少し下げたら通常サイズへ
    startY=null;dy=0;
  };
  zone.addEventListener('pointerup',end);
  zone.addEventListener('pointercancel',end);
  // ハンドルのダブルタップで拡大⇔通常をトグル
  let lastTap=0;
  zone.addEventListener('click',()=>{
    const now=Date.now();
    if(now-lastTap<300){ sheet.classList.toggle('expanded'); }
    lastTap=now;
  });
})();

// スロット役割ごとのサジェスト優先（先頭ほど優先）。盤面ロール→推薦する選手ポジション。
const SUGGEST={
  GK:['GK'], CB:['CB'], LB:['LB'], RB:['RB'],
  LWB:['LB','LW'], RWB:['RB','RW'],
  CDM:['CDM','CM'], CM:['CM','CDM','CAM'], CAM:['CAM','CM'],
  LM:['LW','LB'], RM:['RW','RB'],
  LW:['LW','LM'], RW:['RW','RM'], ST:['ST']
};
let pickRole=null; // 現在ピッカー対象スロットの役割
// 大枠内でのポジション並び順（同じ大枠の選手をポジションごとに固める）
const POSORDER={GK:0,CB:1,RB:2,LB:3,RWB:4,LWB:5,CDM:1,CM:2,CAM:3,RM:4,LM:5,RW:1,LW:2,ST:3};
// スロット指定なし（ベンチ追加など）でのポジション全体並び順：GK→DF→MF→FW
const POSORDERFULL={GK:0,CB:1,RB:2,LB:3,LWB:4,RWB:5,CDM:6,CM:7,CAM:8,RM:9,LM:10,LW:11,RW:12,ST:13};
// 大枠を押した時に出る細かいポジション（ベンチ追加画面のサブフィルタ）
const SUBPOS={DF:['CB','RB','LB'],MF:['CDM','CM','CAM'],FW:['ST','LW','RW']};
function suggestRank(pos){
  if(!pickRole) return 0;
  const tiers=SUGGEST[pickRole]||[pickRole];
  const i=tiers.indexOf(pos);
  if(i>=0){
    // RWB/LWBはRB/LBを最優先→次にRW/LWの段階サジェスト。それ以外の役割はサジェスト群をまとめる（CDM/CM/CAM等を区別せず後段の市場価値順）
    if(pickRole==='LWB'||pickRole==='RWB') return i;
    return 0;
  }
  const sg=grp(pickRole), pg=grp(pos);
  // 以降は大枠ごとにまとめる：自大枠→他フィールド大枠→GK(常に最後)。大枠内はポジション順で固める。
  const gr = pg==='gk' ? 9 : (pg===sg ? 0 : ({df:1,mf:2,fw:3})[pg]);
  return 10 + gr*10 + (POSORDER[pos]||0);
}
// サジェスト順：①役割推薦 ②クラブ読込中はそのクラブ優先 ③市場価値の高い順（非表示・内部利用）④年齢の高い順
function suggestSort(a,b){
  if(pickRole){ const ra=suggestRank(P[a][1]), rb=suggestRank(P[b][1]); if(ra!==rb) return ra-rb; }
  else { const oa=POSORDERFULL[P[a][1]]??99, ob=POSORDERFULL[P[b][1]]??99; if(oa!==ob) return oa-ob; } // スロット指定なし：ポジション順
  const club=state.loadedClub;
  if(club){ const ca=P[a][4].trim()===club?1:0, cb=P[b][4].trim()===club?1:0; if(ca!==cb) return cb-ca; }
  const ma=mvScore(P[a]), mb=mvScore(P[b]);
  if(ma!==mb) return mb-ma;   // 市場価値の高い順（自チーム以外のサジェストに使用）
  return P[b][2]-P[a][2];
}

function wirePickClub(slotIdx){
  const clubF=document.getElementById('clubF');
  if(!clubF)return;
  clubF.onclick=e=>{const c=e.target.closest('[data-club]');if(!c)return;pickFilter.club=c.dataset.club;[...c.parentNode.children].forEach(x=>x.classList.remove('on'));c.classList.add('on');drawPickList(slotIdx);};
}
function playerMatches(p){
  if(pickFilter.lg!=='ALL'&&p[5]!==pickFilter.lg)return false;
  if(pickFilter.subpos){ if(p[1]!==pickFilter.subpos)return false; }
  else if(pickFilter.pos!=='ALL'&&grp(p[1]).toUpperCase()!==pickFilter.pos)return false;
  if(pickFilter.club!=='ALL'&&p[4].trim()!==pickFilter.club)return false;
  if(pickFilter.q&&!(p[0].toLowerCase().includes(pickFilter.q)||p[4].toLowerCase().includes(pickFilter.q)))return false;
  return true;
}
function inXI(pid){return state.slots.some(s=>s.pid===pid)}
function drawPickList(slotIdx){
  const list=document.getElementById('plist');if(!list)return;
  pickCurIdx=P.map((p,i)=>i).filter(i=>playerMatches(P[i])&&(!benchAddMode||(!inXI(i)&&!state.bench.includes(i))));
  const so=pickFilter.sort||'suggest';
  if(so==='age_desc') pickCurIdx.sort((a,b)=>P[b][2]-P[a][2]);
  else if(so==='age_asc') pickCurIdx.sort((a,b)=>P[a][2]-P[b][2]);
  else pickCurIdx.sort(suggestSort);
  if(!pickCurIdx.length){list.innerHTML='<div class="empty-msg">該当する選手がいません</div>';return;}
  list.innerHTML=pickCurIdx.slice(0,PAGE).map(i=>prowHTML(i)).join('');
  if(pickCurIdx.length>PAGE) list.insertAdjacentHTML('beforeend',`<div class="loadmore" id="pickMore">▾ さらに ${pickCurIdx.length-PAGE}人</div>`);
  list._loaded=Math.min(PAGE,pickCurIdx.length);
  list.onscroll=()=>{
    if(list.scrollTop+list.clientHeight>=list.scrollHeight-80){
      const start=list._loaded;if(start>=pickCurIdx.length)return;
      const more=pickCurIdx.slice(start,start+PAGE);

      const ns=document.getElementById('pickMore');
      if(ns){const rem=pickCurIdx.length-list._loaded;if(rem<=0)ns.remove();else ns.textContent='▾ さらに '+rem+'人';}
    }
  };
  list.onclick=e=>{const row=e.target.closest('[data-pid]');if(!row)return;const pid=+row.dataset.pid;if(benchAddMode)addPlayerToBench(pid);else assign(slotIdx,pid);};

function drawMkt(){
  const list=document.getElementById('mlist');if(!list)return;
  const f=mktFilter;
  mktCurIdx=P.map((p,i)=>i).filter(i=>{
    const p=P[i];
    if(f.lg!=='ALL'&&p[5]!==f.lg)return false;
    if(f.pos!=='ALL'&&grp(p[1]).toUpperCase()!==f.pos)return false;
    if(f.club!=='ALL'&&p[4].trim()!==f.club)return false;
    if(f.q&&!(p[0].toLowerCase().includes(f.q)||p[4].toLowerCase().includes(f.q)))return false;
    return true;
  });
  const so=f.sort||'mv';
  mktCurIdx.sort((a,b)=>{
    if(so==='age_desc') return P[b][2]-P[a][2];
    if(so==='age_asc')  return P[a][2]-P[b][2];
    const ma=mvScore(P[a]), mb=mvScore(P[b]); if(ma!==mb) return mb-ma; return P[b][2]-P[a][2]; // 注目順=市場価値の高い順
  });
  if(!mktCurIdx.length){list.innerHTML='<div class="empty-msg">該当する選手がいません</div>';return;}

  list._loaded=Math.min(PAGE,mktCurIdx.length);
  list.onscroll=()=>{
    if(list.scrollTop+list.clientHeight>=list.scrollHeight-80){
      const start=list._loaded;if(start>=mktCurIdx.length)return;
      const more=mktCurIdx.slice(start,start+PAGE);
      const s=document.getElementById('mktMore');
      if(s)s.insertAdjacentHTML('beforebegin',more.map(i=>prowHTML(i)).join(''));
      list._loaded=start+more.length;
      const ns=document.getElementById('mktMore');
      if(ns){const rem=mktCurIdx.length-list._loaded;if(rem<=0)ns.remove();else ns.textContent='▾ さらに '+rem+'人';}
    }
  };
  list.onclick=e=>{const row=e.target.closest('[data-pid]');if(!row)return;openDetail(+row.dataset.pid,null);};
}

function roundRect(x,X,Y,W,H,r){x.beginPath();x.moveTo(X+r,Y);x.arcTo(X+W,Y,X+W,Y+H,r);x.arcTo(X+W,Y+H,X,Y+H,r);x.arcTo(X,Y+H,X,Y,r);x.arcTo(X,Y,X+W,Y,r);x.closePath();}

function preloadFlags(){
  if(!state.showFlags) return Promise.resolve({});
  const codes=new Set();
  state.slots.forEach(s=>{ if(s.pid==null)return; const c=(P[s.pid][3]||'').trim().split(' ').pop(); const fi=FI[c]; if(fi)codes.add(fi); });
  return Promise.all([...codes].map(fi=>new Promise(res=>{
    const im=new Image(); im.crossOrigin='anonymous';
    im.onload=()=>res([fi,im]); im.onerror=()=>res(null);
    im.src='https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/flags/4x3/'+fi+'.svg';
  }))).then(arr=>{ const m={}; arr.forEach(e=>{ if(e)m[e[0]]=e[1]; }); return m; });

function drawSilhouette(x,fx,fy,R){
  x.save();
  x.beginPath();x.arc(fx,fy,R-4,0,7);x.clip();
  x.fillStyle='rgba(234,255,240,.82)';
  // 頭
  x.beginPath();x.arc(fx,fy-9,12,0,7);x.fill();
  // 肩
  x.beginPath();x.arc(fx,fy+30,23,Math.PI,2*Math.PI);x.fill();
  x.restore();
}
async function buildShareCanvas(){
  const photoImgs=await preloadPhotos();
  const flagImgs=await preloadFlags();
  const W=1080,H=1440,cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const x=cv.getContext('2d');
  const accent=(state.teamInfo&&state.teamInfo.color)||'#caff3a';
  // 背景
  const bg=x.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#16221c');bg.addColorStop(.45,'#0a0e0c');bg.addColorStop(1,'#0a0e0c');
  x.fillStyle=bg;x.fillRect(0,0,W,H);
  // ヘッダー：アプリ名（常に表示）
  x.textBaseline='alphabetic';x.textAlign='left';
  x.font='800 58px Manrope,sans-serif';x.fillStyle='#eafff0';x.fillText('STARTING',56,104);
  const w1=x.measureText('STARTING ').width;
  x.fillStyle=accent;x.fillText(' XI',56+w1,104);
  // フォーメーション右上
  x.textAlign='right';x.font='800 46px "Bebas Neue",Manrope,sans-serif';x.fillStyle='#7d9389';
  x.fillText(state.formation,W-56,100);x.textAlign='left';
  // チーム名（ピル）
  const tn=teamDisplayName();let headBottom=150;
  if(tn){
    x.font='800 34px Manrope,sans-serif';const pw=Math.min(x.measureText(tn).width,W-180);
    x.fillStyle=accent;roundRect(x,56,128,pw+52,60,30);x.fill();
    x.fillStyle='#0a0e0c';x.fillText(tn,84,170);headBottom=210;
    if(state.teamInfo&&state.teamInfo.slogan){x.font='600 26px Manrope,sans-serif';x.fillStyle='#7d9389';x.fillText(state.teamInfo.slogan,58,244);headBottom=260;}
  }
  // ピッチ
  const px=46,py=Math.max(270,headBottom+30),pw=W-92,ph=920;
  // 芝のストライプ
  const stripes=11;for(let i=0;i<stripes;i++){x.fillStyle=(i%2===0)?'#15493a':'#12402f';x.fillRect(px,py+ph/stripes*i,pw,ph/stripes+1);}
  roundRect(x,px,py,pw,ph,24);x.save();x.clip();
  // マーキング
  x.strokeStyle='rgba(255,255,255,.16)';x.lineWidth=3;
  x.strokeRect(px+pw*0.24,py,pw*0.52,ph*0.14);
  x.strokeRect(px+pw*0.24,py+ph*0.86,pw*0.52,ph*0.14);
  x.beginPath();x.moveTo(px+pw*0.05,py+ph/2);x.lineTo(px+pw*0.95,py+ph/2);x.stroke();
  x.beginPath();x.arc(px+pw/2,py+ph/2,pw*0.13,0,7);x.stroke();
  x.restore();
  roundRect(x,px,py,pw,ph,24);x.lineWidth=4;x.strokeStyle='rgba(255,255,255,.12)';x.stroke();
  // トークン
  state.slots.forEach(s=>{
    if(s.pid==null)return;const p=P[s.pid];
    const fx=px+(s.x/100)*pw, fy=py+((100-s.y)/100)*ph, R=42;
    x.beginPath();x.arc(fx,fy,R,0,7);x.fillStyle='#10160f';x.fill();
    x.textAlign='center';
    const im=photoImgs[s.pid];
    if(im){
      // ユーザーが追加した写真を円形に反映
      x.save();x.beginPath();x.arc(fx,fy,R-4,0,7);x.clip();
      const side=Math.min(im.width,im.height);
      const sx=(im.width-side)/2, sy=(im.height-side)/2;
      x.drawImage(im,sx,sy,side,side, fx-(R-4),fy-(R-4),(R-4)*2,(R-4)*2);
      x.restore();
    }else{
      // 写真なしは頭の形のシルエット（イニシャルは入れない）
      drawSilhouette(x,fx,fy,R);
    }
    x.lineWidth=6;x.strokeStyle=roleCol(s.role);x.beginPath();x.arc(fx,fy,R,0,7);x.stroke();
    // キャプテン
    if(state.captain===s.pid){x.beginPath();x.arc(fx-R+8,fy-R+8,16,0,7);x.fillStyle='#ffd166';x.fill();x.fillStyle='#0a0e0c';x.font='800 20px Manrope,sans-serif';x.fillText('C',fx-R+8,fy-R+15);}
    // 名前（＋国旗が有効なら国旗も）。ポジション名を隠す設定時は大きめに、役職は描かない
    const nmSize=state.hideRoles?30:26;
    x.font='800 '+nmSize+'px Manrope,sans-serif';
    const nm=nameOf(s.pid,true);
    const code=(p[3]||'').trim().split(' ').pop();
    const fImg=(state.showFlags&&FI[code])?flagImgs[FI[code]]:null;
    const nameW=x.measureText(nm).width;
    const flagH=Math.round(nmSize*0.82), flagW=Math.round(flagH*4/3), gap=8;
    const totalW=nameW+(fImg?flagW+gap:0);
    const startX=fx-totalW/2, nameBaseY=fy+R+46;
    x.textAlign='left';
    if(fImg){
      const flagY=(nameBaseY-nmSize*0.34)-flagH/2;
      x.drawImage(fImg,startX,flagY,flagW,flagH);
      x.lineWidth=1;x.strokeStyle='rgba(0,0,0,.4)';x.strokeRect(startX,flagY,flagW,flagH);
    }
    x.fillStyle='#eafff0';
    x.fillText(nm,startX+(fImg?flagW+gap:0),nameBaseY);
    x.textAlign='center';
    let subY=fy+R+70;
    if(!state.hideRoles){
      // 役職
      x.fillStyle=roleCol(s.role);x.font='700 19px Manrope,sans-serif';
      x.fillText(s.role,fx,fy+R+70);
      subY=fy+R+92;
    }
    // 第二候補（表示設定が有効なときのみ）
    if(state.showSubs&&s.sub!=null&&P[s.sub]){x.fillStyle='#ffc46b';x.font='700 18px Manrope,sans-serif';x.fillText('▸ '+nameOf(s.sub,true),fx,subY);}
    x.textAlign='left';
  });
  // フッター
  const fy=py+ph+58;
  const xi=state.slots.filter(s=>s.pid!=null).map(s=>P[s.pid]);
  const avgAge=xi.length?(xi.reduce((a,p)=>a+p[2],0)/xi.length).toFixed(1):'–';
  x.fillStyle='#7d9389';x.font='700 26px Manrope,sans-serif';x.textAlign='left';
  x.fillText('AVG AGE',56,fy);
  x.fillStyle=accent;x.font='800 40px "Bebas Neue",Manrope,sans-serif';
  x.fillText(avgAge,56,fy+44);
  x.textAlign='right';x.fillStyle='#5a6b62';x.font='700 24px Manrope,sans-serif';
  x.fillText('⚽ made with STARTING XI',W-56,fy);
  x.fillStyle=accent;x.font='700 24px Manrope,sans-serif';
  x.fillText(APP_URL.replace('https://',''),W-56,fy+38);
  x.textAlign='left';
  return cv;
}

async function shareLineup(){
  const filled=state.slots.filter(s=>s.pid!=null).length;
  if(!filled){ toast('まず選手を配置してください'); return; }
  toast('画像を生成中…');
  const tn=teamDisplayName();
  const shareText=(tn?tn+' ':'')+'の最強スタメン⚽ #StartingXI で作成！';
  let canvas;
  try{ canvas=await buildShareCanvas(); }catch(e){ toast('画像の生成に失敗しました'); return; }
  canvas.toBlob(blob=>{
    if(!blob){ toast('画像の生成に失敗しました'); return; }
    const file=new File([blob],'starting-xi.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],text:shareText,url:APP_URL}).catch(()=>{});
    }else{
      openShareFallback(URL.createObjectURL(blob),shareText);
    }
  },'image/png');
}
// 共有非対応時：画像プレビュー＋アプリリンク（青・見切れ表示）＋保存/コピー
function openShareFallback(imgUrl,shareText){
  openSheet(`
    <h2>SNSに共有 <span>プレビュー</span></h2>
    <div class="detail">
      <div class="shareprev"><img src="${imgUrl}" alt="lineup"></div>
      <div class="sharecap">${escAttr(shareText)}</div>
      <div class="sharebtns">
        <button class="snsbtn x" id="shX"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.2 2H21l-6.4 7.3L22 22h-6.3l-4.9-6.4L4.9 22H2l6.8-7.8L2 2h6.4l4.5 5.9L18.2 2Zm-1.1 18h1.7L7 3.8H5.2L17.1 20Z"/></svg>X でシェア</button>
        <button class="snsbtn ig" id="shIG"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>Instagram</button>
      </div>
      <button class="bigbtn" id="shDl">画像を保存</button>
      <button class="bigbtn ghost" id="shCopy">キャプション＋リンクをコピー</button>
    </div>`);
  const dlImg=()=>{const a=document.createElement('a');a.href=imgUrl;a.download='starting-xi.png';a.click();};
  document.getElementById('shDl').onclick=()=>{dlImg();toast('画像を保存しました');};
  document.getElementById('shX').onclick=()=>{
    dlImg();
    const url='https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText)+'&url='+encodeURIComponent(APP_URL);
    window.open(url,'_blank','noopener');
    toast('画像を保存しました。Xの投稿画面に貼り付けてください');
  };
  document.getElementById('shIG').onclick=()=>{
    dlImg();
    window.open('https://www.instagram.com/','_blank','noopener');
    toast('画像を保存しました。Instagramアプリで投稿してください');
  };
  document.getElementById('shCopy').onclick=async()=>{try{await navigator.clipboard.writeText(shareText+' '+APP_URL);toast('コピーしました');}catch(e){toast('コピーできませんでした');}};
}
document.getElementById('btnShare').onclick=shareLineup;

// ポジション名 表示/非表示トグル（名前だけ表示にすると選手名が大きくなる）
function syncLabelBtn(){ const b=document.getElementById('btnLabels'); if(b)b.classList.toggle('on',!!state.hideRoles); }
document.getElementById('btnLabels').onclick=()=>{
  state.hideRoles=!state.hideRoles;
  syncLabelBtn();render();save();
  toast(state.hideRoles?'ポジション名を非表示（名前を大きく表示）':'ポジション名を表示');
};

function syncFlagBtn(){ const b=document.getElementById('btnFlags'); if(b)b.classList.toggle('on',!!state.showFlags); }
document.getElementById('btnFlags').onclick=()=>{
  state.showFlags=!state.showFlags;
  syncFlagBtn();render();save();

document.getElementById('btnSubs').onclick=()=>{
  state.showSubs=!state.showSubs;

};

// 整列リセット（フォーメーション既定位置へ）
document.getElementById('btnReset').onclick=()=>{
  const f=FORM[state.formation];
  state.slots.forEach((s,i)=>{s.x=f[i][1];s.y=f[i][2];});
  render();save();toast('既定の配置に戻しました');
};

   Toast
   ========================================================= */
let tT;const toastEl=document.getElementById('toast');
function toast(m){toastEl.textContent=m;toastEl.classList.add('on');clearTimeout(tT);tT=setTimeout(()=>toastEl.classList.remove('on'),1900);}

/* =========================================================
   Init
   ========================================================= */
(async function init(){
  const saved=await load();
  const ph=await loadPhotos();
  if(ph&&typeof ph==='object')state.photos=ph;
  state.names=(saved&&saved.names&&typeof saved.names==='object')?saved.names:{};
  state.hideRoles=!!(saved&&saved.hideRoles);
  state.showFlags=(saved&&typeof saved.showFlags==='boolean')?saved.showFlags:true;
  state.showSubs=(saved&&typeof saved.showSubs==='boolean')?saved.showSubs:true;
  syncLabelBtn();syncFlagBtn();syncSubBtn();
  if(saved&&saved.slots&&saved.slots.length===11){
    state.formation=saved.formation||"4-3-3";
    state.slots=saved.slots;
    state.bench=Array.isArray(saved.bench)?saved.bench:[];
    state.loadedClub=saved.loadedClub||null;
    state.captain=(saved.captain!=null)?saved.captain:null;
    state.teamName=saved.teamName||null;
    state.teamInfo=saved.teamInfo||null;
    [...fbar.children].forEach(c=>c.classList.toggle('on',c.textContent===state.formation));
  }else{
    buildSlots("4-3-3",false);
  }
  render();
})();
</script>
